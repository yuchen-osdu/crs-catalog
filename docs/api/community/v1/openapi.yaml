components:
  schemas:
    InPolygonQuery:
      type: object
      description: Coordinate Transformations
      properties:
        recordId:
          type: string
          description: Record of CRS or CT to check points against
        dataId:
          type: string
          description: Searches on id for CRS records
        points:
          type: array
          description: List of points to check against CRS or CT bounding boxes
          items:
            $ref: "#/components/schemas/Point"
        offset:
          type: string
          description: Corresponds to offset on search service
        limit:
          type: string
          description: Corresponds to limit on search service. Default is to return
            all found entities.
        returnedFields:
          type: array
          description: List of specific fields to return.
          items:
            type: string
    Point:
      type: object
      description: A geographic coordinate expressed as a latitude/longitude pair.
      properties:
        latitude:
          type: number
          format: double
          description: Latitude of point.
          example: "37.450727"
          maximum: 90
          minimum: -90
        longitude:
          type: number
          format: double
          description: Longitude of point.
          example: "-122.174762"
          maximum: 180
          minimum: -180
    PointsInAouSearchPoint:
      type: object
      description: A point that didn't land in the bounding box for area of use search
      properties:
        point:
          $ref: "#/components/schemas/Point"
          description: "Lat, long point"
        index:
          type: integer
          format: int32
          description: A zero-based index of the point in the input "points" array
        approximateKmDistanceOutside:
          type: integer
          format: int32
          description: Kilometers outside the record's bounding box
    PointsInAouSearchResult:
      type: object
      description: "List of failed points, ones that aren't in bounding box"
      properties:
        bboxFailedPoints:
          type: array
          description: A point that didn't land in the bounding box for area of use
            search
          items:
            $ref: "#/components/schemas/PointsInAouSearchPoint"
        maxDistKmOutsideBBox:
          type: string
          description: Point distance with highest km outside bounding box
    AppError:
      type: object
      description: Standard error response returned by OSDU services.
      properties:
        code:
          type: integer
          format: int32
          description: HTTP status code.
          example: 400
        reason:
          type: string
          description: Short error reason.
          example: Bad Request
        message:
          type: string
          description: Detailed error message.
          example: Invalid record format.
    CoordinateTransformationsQuery:
      type: object
      description: Body for searching on CTs
      properties:
        codeSpace:
          type: string
          description: Corresponds to CodeSpace field on CT records
        name:
          type: string
          description: Corresponds to Name field on CT records. All entities with
            name containing the search string will be returned. Wildcard is not supported
        id:
          type: string
          description: Corresponds to ID field on CT records
        code:
          type: string
          description: Corresponds to Code field on CT records
        kind:
          type: string
          description: "Corresponds to the Kind field on CT records. Default is to\
            \ not return CT records with Kind \"VerticalTransformation\". Viable options\
            \ include \"Transformation\", \"ConcatenatedOperation\", \"VerticalTransformation\"\
            , \"ExcludeVertical\" (default) and \"All\". \"All\" is a special value\
            \ which indicates returning records of all kinds."
        sourceCRS:
          type: string
          description: "Corresponds to SourceCRS.SourceCRSID (record id), e.g., \"\
            osdu:reference-data--CoordinateReferenceSystem:Geographic2D:EPSG::4198:\"\
            . As SourceCRS and TargetCRS are interchangeable, it will also search\
            \ TargetCRS.TargetCRSID"
        targetCRS:
          type: string
          description: "Corresponds to TargetCRS.TargetCRSID (record id), e.g., \"\
            osdu:reference-data--CoordinateReferenceSystem:Geographic2D:EPSG::4198:\"\
            . As SourceCRS and TargetCRS are interchangeable, it will also search\
            \ SourceCRS.SourceCRSID"
        latitude:
          type: string
          description: "Returns all entities for which the (Latitude, Longitude) is\
            \ inside the Extent bounding box. Must also provide longitude"
        longitude:
          type: string
          description: See latitude
        includeDeprecated:
          type: string
          description: Whether to return deprecated records marked with InactiveIndicator=true.
            Default is false.
        offset:
          type: string
          description: Corresponds to offset on search service
        limit:
          type: string
          description: Corresponds to limit on search service. Default is to return
            all found entities.
        returnAllFields:
          type: string
          description: Whether to return all fields in the record. Default is false
            and only a subset is returned
        returnedFields:
          type: array
          description: List of specific fields to return. Overridden when returnAllFields
            is true.
          items:
            type: string
    AggregationResponse:
      type: object
      properties:
        key:
          type: string
        count:
          type: integer
          format: int64
    CursorQueryResponse:
      type: object
      description: Cursor-based search query response for retrieving large result
        sets incrementally.
      properties:
        cursor:
          type: string
          description: Search context to retrieve the next page of results. Null when
            there are no more results.
          example: AoE=
        results:
          type: array
          description: "List of matched records, each represented as a map of field\
            \ names to values."
          items:
            type: object
            additionalProperties: true
        totalCount:
          type: integer
          format: int64
          description: Total number of records matching the query. Capped at 10000
            unless trackTotalCount is true.
          example: 1
    QueryResponse:
      type: object
      description: Search query response containing matched records and associated
        metadata.
      properties:
        results:
          type: array
          description: "List of matched records, each represented as a map of field\
            \ names to values."
          items:
            type: object
            additionalProperties: true
        aggregations:
          type: array
          description: "Aggregation results keyed by field name, present only when\
            \ aggregateBy is specified."
          items:
            $ref: "#/components/schemas/AggregationResponse"
        phraseSuggestions:
          type: array
          description: Phrase completion suggestions returned when suggestPhrase is
            specified.
          items:
            type: string
        totalCount:
          type: integer
          format: int64
          description: Total number of records matching the query. Capped at 10000
            unless trackTotalCount is true.
          example: 1
    SearchResponse:
      type: object
      description: Results for most V3 endpoints
      properties:
        searchResults:
          $ref: "#/components/schemas/QueryResponse"
          description: Results from Search service
        cursorSearchResults:
          $ref: "#/components/schemas/CursorQueryResponse"
          description: Cursor-based results from Search service
        query:
          type: string
          description: Query string used against Search service
    BaseCRS:
      type: object
      description: BaseCRS
      properties:
        id:
          type: string
          description: Record Id of parent CRS
        name:
          type: string
          description: Name of parent CRS
    CoordinateReferenceSystemsQuery:
      type: object
      description: Body for searching on CRSs
      properties:
        codeSpace:
          type: string
          description: Corresponds to CodeSpace field on CRS records
        code:
          type: string
          description: Corresponds to Code field on CRS records
        name:
          type: string
          description: Corresponds to Code field on CRS records
        id:
          type: string
          description: Corresponds to ID field on CRS records
        kind:
          type: string
          description: Corresponds to Kind field on CRS records
        coordinateReferenceSystemType:
          type: string
          description: "Type of CRS, e.g., BoundCRS, ProjectedCRS, GeodeticCRS, VerticalCRS"
        returnBoundProjectedAndProjectedBasedOnWgs84:
          type: string
          description: "Whether or not to only return bound projected type or projected\
            \ type based on wgs84. If true, it only returns CRS 1. with Kind as \"\
            BoundProjected\" or 2. with Kind as \"projected\" and BaseCRS.AuthorityCode.Code\
            \ as 4326"
        returnBoundGeographic2DAndWgs84:
          type: string
          description: "Whether or not to only return bound geopraphic 2d type. If\
            \ true, it only returns CRS 1. with Kind as \"BoundGeographic2D\" or 2.\
            \ with Kind as \"geographic 2D\" and Code as 4326 and CodeSpace as \"\
            EPSG\" "
        baseCRS:
          $ref: "#/components/schemas/BaseCRS"
          description: BaseCRS
        datum:
          $ref: "#/components/schemas/Datum"
          description: Datum
        extent:
          type: string
          description: Description of extent. Corresponds to PreferredUsage.Extent.Description
            in the record. All entities with PreferredUsage.Extent.Description containing
            the search string will be returned. Wildcard is not supported.
        persistableReferenceSearch:
          type: string
          description: Corresponds to PersistableReference field on CRS records. All
            entities with PersistableReference containing the search string will be
            returned.
        horizontalAxisUnitId:
          type: string
          description: "Corresponds to CoordinateSystem.HorizontalAxisUnitID field\
            \ on CRS records, e.g., \"osdu:reference-data--UnitOfMeasure:dega:\"."
        verticalAxisUnitId:
          type: string
          description: Corresponds to CoordinateSystem.VerticalAxisUnitID field on
            CRS records
        latitude:
          type: string
          description: Latitude point for searching on CRS bounding box
        longitude:
          type: string
          description: Longitude point for searching on CRS bounding box
        includeDeprecated:
          type: string
          description: Whether to return deprecated records marked with InactiveIndicator=true.
            Default is false
        offset:
          type: string
          description: Corresponds to offset on search service
        limit:
          type: string
          description: Corresponds to limit on search service. Default is to return
            all found entities.
        returnAllFields:
          type: string
          description: Whether to return all fields in the record. Default is false
            and only a subset is returned
        returnedFields:
          type: array
          description: Return all fields in the record
          items:
            type: string
    Datum:
      type: object
      description: Datum associated with a CRS.
      properties:
        name:
          type: string
          description: Name of datum
        codeSpace:
          type: string
          description: Codespace of datum
        code:
          type: string
          description: Code of datum
    AuthorityCode:
      type: object
      properties:
        authority:
          type: string
        code:
          type: string
    SingleCTEssenceImpl:
      type: object
      properties:
        authCode:
          $ref: "#/components/schemas/AuthorityCode"
        type:
          type: string
        ver:
          type: string
        name:
          type: string
        wkt:
          type: string
    SingleCTRequest:
      type: object
      description: "Request to get one SingleCT given its 'persistableReference' (serialized\
        \ essence) or 'essence' structure. Only one, persistableReference or essence\
        \ must be provided. If both are provided, essence takes precedence."
      properties:
        essence:
          $ref: "#/components/schemas/SingleCTEssenceImpl"
          description: Single cartographic transformation.
        persistableReference:
          type: string
          description: "The persistable reference string, either the essence of the\
            \ SingleCT serialized into a JSON string or an encoded string (version\
            \ 1)."
    AreaOfUse:
      type: object
      properties:
        name:
          type: string
        areaOfUseEssence:
          $ref: "#/components/schemas/AreaOfUseEssence"
        areaOfUseDeprecationInfo:
          $ref: "#/components/schemas/AreaOfUseDeprecationInfo"
        lastModified:
          type: string
        description:
          type: string
        essence:
          $ref: "#/components/schemas/Essence"
        deprecationInfo:
          $ref: "#/components/schemas/DeprecationInfo"
        namedReference:
          $ref: "#/components/schemas/NamedReference"
        aliasNames:
          type: array
          items:
            type: string
    AreaOfUseDeprecationInfo:
      type: object
      properties:
        supersededByArea:
          $ref: "#/components/schemas/AreaOfUse"
        deprecationState:
          type: string
        remarks:
          type: string
    AreaOfUseEssence:
      type: object
      properties:
        name:
          type: string
        boundingBox:
          $ref: "#/components/schemas/SphericalBoundingBox"
        type:
          type: string
        authorityCode:
          $ref: "#/components/schemas/AuthorityCode"
    CT:
      type: object
      properties:
        fromCRSAuthorityCode:
          $ref: "#/components/schemas/AuthorityCode"
        toCRSAuthorityCode:
          $ref: "#/components/schemas/AuthorityCode"
        ctdeprecationInfo:
          $ref: "#/components/schemas/CTDeprecationInfo"
        source:
          type: string
        areaOfUse:
          $ref: "#/components/schemas/AreaOfUse"
        lastModified:
          type: string
        description:
          type: string
        essence:
          $ref: "#/components/schemas/Essence"
        deprecationInfo:
          $ref: "#/components/schemas/DeprecationInfo"
        namedReference:
          $ref: "#/components/schemas/NamedReference"
        aliasNames:
          type: array
          items:
            type: string
    CTDeprecationInfo:
      type: object
      properties:
        supersededByCT:
          $ref: "#/components/schemas/CT"
        deprecationState:
          type: string
        remarks:
          type: string
    DeprecationInfo:
      type: object
      properties:
        deprecationState:
          type: string
        remarks:
          type: string
    Essence:
      type: object
      properties:
        type:
          type: string
        authorityCode:
          $ref: "#/components/schemas/AuthorityCode"
    NamedReference:
      type: object
      description: Name and Persistable Reference (the essence converted to a JSON
        string).
      properties:
        name:
          type: string
          description: The name of the item.
        persistableReference:
          type: string
          description: The item 'essence' serialized into a JSON string..
    SingleCT:
      type: object
