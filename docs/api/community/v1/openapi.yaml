  /v2/search/ct:
    post:
      tags:
      - cartographic-transformations-api
      summary: Search Cartographic Transformations
      description: "Search cartographic transform records (any sub-type) by keywords\
        \ and/or geographic area. Geographical constraints are passed (optionally)\
        \ as parameters via the query URL, search keywords are passed via the request\
        \ body. Query syntax follows Lucene style, default operator for multiple expressions\
        \ is AND. The following keywords are supported: ''name:'',''description:'',\
        \ ''type:'', ''authority:'', ''code:'', ''deprecationState:'', ''remarks:'',\
        \ ''lastModified:'', ''source:'', ''wellKnownText:'', ''fromCRS.authority:'',\
        \ ''fromCRS.code:'', ''toCRS.authority:'', toCRS.code:'', ''policy:''. followed\
        \ by a value. Example: ''fromCRS.code:4267''."
      operationId: searchCTs
      parameters:
      - name: longitudeLeft
        in: query
        required: false
        schema:
          type: number
          format: double
          default: -180.0
      - name: latitudeLower
        in: query
        required: false
        schema:
          type: number
          format: double
          default: -90.0
      - name: longitudeRight
        in: query
        required: false
        schema:
          type: number
          format: double
          default: 180.0
      - name: latitudeUpper
        in: query
        required: false
        schema:
          type: number
          format: double
          default: 90.0
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 100
      - name: mode
        in: query
        required: false
        schema:
          type: string
          default: persistableReference
      - name: data-partition-id
        in: header
        description: Tenant Id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
        required: true
      responses:
