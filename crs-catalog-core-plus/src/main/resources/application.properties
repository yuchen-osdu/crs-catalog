LOG_PREFIX=crs-catalog

server.servlet.contextPath=/api/crs/catalog/
logging.level.org.springframework=${LOG_LEVEL:INFO}
server.port=8080

spring.main.allow-bean-definition-overriding=true

JAVA_HEAP_OPTS=-Xms4096M -Xmx4096M
JAVA_GC_OPTS=-XX:+UseG1GC -XX:+UseStringDeduplication -XX:InitiatingHeapOccupancyPercent=45

# Entitlement properties
# [Required] URL of the Entitlements Service
ENTITLEMENTS_HOST=http://entitlements
ENTITLEMENTS_PATH=/api/entitlements/v2/
ENTITLEMENTS_API=${ENTITLEMENTS_HOST}${ENTITLEMENTS_PATH}
osdu.entitlement.url=${ENTITLEMENTS_API}

SEARCH_HOST=http://search
SEARCH_PATH=/api/search/v2
SEARCH_API=${SEARCH_HOST}${SEARCH_PATH}

# Other properties
# [Optional] [AKS] [GKE] File location of the crs catalog
osdu.crs.catalog.filename=${CRS_CATALOG_FILENAME:/mnt/crs_catalogs/crs_catalog_v2.json}
# CRS_CATALOG_FILENAME=C:\\osdu-delfi\\os-crs-catalog-service\\data\\crs_catalog_v2.json

#Health checks
management.server.port=${MANAGEMENT_SERVER_PORT:8081}
management.endpoints.web.base-path=${MANAGEMENT_ENDPOINTS_WEB_BASE:/}
management.endpoints.web.exposure.include=health
management.health.probes.enabled=true

