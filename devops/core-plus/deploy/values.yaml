global:
  domain: ""
  limitsEnabled: true

data:
  # configmaps
  logLevel: "ERROR"
  entitlementsHost: "http://entitlements"
  # deployments
  requestsCpu: "5m"
  requestsMemory: "280Mi"
  limitsCpu: "1"
  limitsMemory: "1G"
  serviceAccountName: "crs-catalog"
  image: ""
  imagePullPolicy: "IfNotPresent"

conf:
  appName: "crs-catalog"
  replicas: 1

istio:
  proxyCPU: "5m"
  proxyCPULimit: "200m"
  proxyMemory: "50Mi"
  proxyMemoryLimit: "256Mi"
  auth:
    disable:
      - "/"
      - "*/index.html"
      - "*/api-docs"
      - "*/api-docs/**"
      - "*/api-docs.yaml"
      - "*/swagger"
      - "*/swagger-ui.html"
      - "*/swagger-ui/**"
      - "*/swagger-resources"
      - "*/swagger-config"
      - "*/actuator/health"
      - "*/health/liveness"
      - "*/health/readiness"
      - "*/_ah/**"
