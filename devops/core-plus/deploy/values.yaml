global:
  domain: ""
  limitsEnabled: true

data:
  # configmaps
  logLevel: "ERROR"
  entitlementsHost: "http://entitlements"
  # deployments
  requestsCpu: "5m"
  requestsMemory: "280Mi"
  limitsCpu: "1"
  limitsMemory: "1G"
  serviceAccountName: "crs-catalog"
  image: ""
  imagePullPolicy: "IfNotPresent"

conf:
  appName: "crs-catalog"
  replicas: 1

istio:
  proxyCPU: "5m"
  proxyCPULimit: "200m"
  proxyMemory: "50Mi"
  proxyMemoryLimit: "256Mi"
  auth:
    basePath: /api/crs/catalog
    versions:
      - v2
      - v3
    disable:
      - "api-docs"
      - "api-docs/*"
      - "api-docs.yaml"
      - "swagger" #TODO need to check if needs
      - "swagger-ui.html" #TODO need to check if needs
      - "swagger-ui/*" #TODO need to check if needs
      - "swagger-resources" #TODO need to check if needs
      - "swagger-config" #TODO need to check if needs
      - "health/liveness"
      - "health/readiness"
