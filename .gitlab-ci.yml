variables:
  CORE_BUILD_SUBDIR: crs-catalog-core
  AWS_BUILD_SUBDIR: provider/crs-catalog-aws/build-aws
  AWS_TEST_SUBDIR: testing/catalog_test_aws
  AWS_CHART_SUBDIR: devops/aws/chart
  AWS_SERVICE: crs-catalog
  AWS_SERVICE_GATEWAY: osdu-gateway
  AWS_ENVIRONMENT: dev
  AWS_INT_TEST_TYPE: python
  AWS_DEPLOY_TARGET: TF
  AWS_EKS_DEPLOYMENT_NAME: os-crs-catalog

  #azure
  AZURE_SERVICE: crs_catalog
  AZURE_BUILD_SUBDIR: provider/crs-catalog-azure/crs-catalog-aks
  AZURE_TEST_SUBDIR: testing/catalog_test_azure
  AZURE_TEST_TYPE: python
  AZURE_SWAGGER_PATH: api/crs/catalog/swagger-ui/index.html#
  SHARE_NAME: crs
  AZURE_SKIP_INTEGRATION_TEST: "true"

  ACCEPTANCE_TEST_DIR: $CI_PROJECT_DIR/crs-catalog_acceptance_test
  CIMPL_BAREMETAL_PYTHON_INT_TEST_SUBDIR: $CI_PROJECT_DIR/crs-catalog_acceptance_test
  CIMPL_OPENAPI_CONFIG_ROUTE: /api/crs/catalog/api-docs/swagger-config
  # Java service with Python acceptance tests — override the Python->JSON auto-detection
  # so the openapi-spec check fetches the YAML spec served by springdoc
  CIMPL_OPENAPI_YAML_ROUTE: /api/crs/catalog/api-docs.yaml

include:
  - project: "osdu/platform/ci-cd-pipelines"
    file: "standard-setup.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "build/maven.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "scanners/fossa-maven.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "scanners/gitlab-ultimate.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "cloud-providers/gc-global.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "cloud-providers/aws-global.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "cloud-providers/aws-maven.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "cloud-providers/azure.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "cloud-providers/aws-python.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "cloud-providers/cimpl-global.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "cloud-providers/aws-one-pipeline.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "cloud-providers/azure-one-pipeline.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "cloud-providers/gc-one-pipeline.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "reporting/reporting.yml"

  - local: "devops/gc/pipeline/override-stages.yml"

  - local: "devops/aws/pipeline/override-stages.yml"

  - local: "devops/core-plus/pipeline/override-stages.yml"

gemnasium-maven-dependency_scanning:
  variables:
    DS_JAVA_VERSION: 17

azure_containerize:
  variables:
    AZURE_CONTAINERIZE_REPOSITORY: "https://gitlab-ci-token:${CI_JOB_TOKEN}@community.opengroup.org/osdu/platform/deployment-and-operations/base-containers-azure/service-base-image"

fossa-analyze:
  image: $CI_REGISTRY/divido/fossa-with-cache:v0.9-jdk17

fossa-check-notice:
  image: $CI_REGISTRY/divido/fossa-with-cache:v0.9-jdk17

# It is a temporary change as there are no tests written for this service.
# Therefore the job has been disabled
azure_code_coverage:
  variables:
    AZURE_SKIP_COVERAGE: "true"
